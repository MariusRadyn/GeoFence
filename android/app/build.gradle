
plugins {
    id "com.android.application"
    id "kotlin-android"
    id 'com.google.gms.google-services'
    // Must be AFTER Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

// Load MAP_API_KEY from local.properties
def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}
def MAP_API_KEY = localProperties.getProperty("MAP_API_KEY")

android {
    namespace = "limitless.iot.trinity"

    compileSdk = flutter.compileSdkVersion
    //ndkVersion = flutter.ndkVersion
    ndkVersion = "27.0.12077973"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "limitless.iot.trinity"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = 23
        targetSdk = 36
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        resValue "string", "google_maps_key", MAP_API_KEY
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}
dependencies {
    // Import the BoM for the Firebase platform
    implementation(platform("com.google.firebase:firebase-bom:34.12.0"))
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'

    // Firebase
    //implementation "com.google.firebase:firebase-firestore-ktx"
    //implementation "com.google.firebase:firebase-storage-ktx"

    // RecyclerView
    //implementation "androidx.recyclerview:recyclerview:1.3.2"

    // Glide
    //implementation "com.github.bumptech.glide:glide:4.16.0"
    //annotationProcessor "com.github.bumptech.glide:compiler:4.16.0"
}

flutter {
    source = "../.."
}
